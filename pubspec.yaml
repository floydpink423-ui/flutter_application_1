name: flutter_application_1
description: "App de ductos SERMNE"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  shared_preferences: ^2.2.2
  http: ^1.1.0
  path_provider: ^2.1.2
  excel: ^2.1.0

  firebase_core: ^2.30.0
  cloud_firestore: ^4.17.5
  firebase_auth: ^4.19.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo2.png"

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/logo2.png"