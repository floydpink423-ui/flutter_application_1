# cambio IPA real
workflows:
  ios-release:
    name: iOS Release (IPA)
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/Library/Caches/CocoaPods

    scripts:
      - name: Clean project
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock

      - name: Get dependencies
        script: |
          flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build IPA (device)
        script: |
          flutter build ipa --release

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - floydpink423@gmail.com