workflows:
  ios-workflow:
    name: iOS Build
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Clean project
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          flutter pub get

      - name: Install pods fresh
        script: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS (simulator)
        script: flutter build ios --simulator

    artifacts:
      - build/ios/iphonesimulator/*.app